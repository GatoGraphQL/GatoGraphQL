################################################################################
# ⚠️ Troubleshooting: "404 page not found" at https://gatographql.lndo.site/
# (only when `proxy: "ON"` in ~/.lando/config.yml)
#
# Fix is automated via `restart-lando-proxy` composer script.
#
# To do it by hand, run either of:
#   composer restart-lando-proxy
#   docker restart landoproxyhyperion5000gandalfedition_proxy_1
# (A route is only registered for containers that are UP at restart time.)
################################################################################

name: gatographql
recipe: wordpress
config:
  webroot: wordpress
  php: '8.2'
  ssl: true
  # @todo Maybe re-enable MariaDB, sometimes giving error when doing `rebuild-server` in Lando
  # database: mariadb
  xdebug: true
  config:
    php: ../shared/config/php.ini
services:
  database:
    portforward: true
  appserver:
    scanner:
      retry: 10
      okCodes:
        - 200
        - 301
        - 302
    overrides:
      environment:
        XDEBUG_MODE: ''
      volumes:
        - ../_shared:/app/_shared-webserver
env_file:
  - defaults.app.env
  - defaults.env
  - defaults.local.env
