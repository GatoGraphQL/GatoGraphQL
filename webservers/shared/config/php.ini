[PHP]

; Xdebug
xdebug.max_nesting_level = 256
xdebug.show_exception_trace = 0
; Extra custom Xdebug setting for profiling using xcachegrind:
; max_execution_time = 300 ; Set to 300 seconds (5 minutes)
; xdebug.mode = profile
xdebug.mode = debug
xdebug.output_dir = /app/tmp/xdebug
xdebug.client_host = ${LANDO_HOST_IP}
xdebug.client_port = 9003
; Uncomment to trigger always (eg: when WP editor calls REST API, i.e. without adding XDEBUG_TRIGGER=1)
; xdebug.start_with_request = yes
xdebug.start_with_request = trigger
xdebug.log = /tmp/xdebug.log
