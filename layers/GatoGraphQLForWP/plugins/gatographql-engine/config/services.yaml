    GatoGraphQL\GatoGraphQLEngine\PluginDataSetup\PluginDataSetupServiceInterface:
        class: \GatoGraphQL\GatoGraphQLEngine\PluginDataSetup\PluginDataSetupService

    GatoGraphQL\GatoGraphQLEngine\Services\:
        resource: ../src/Services/*

    GatoGraphQL\GatoGraphQLEngine\State\:
        resource: '../src/State/*'

    GatoGraphQL\GatoGraphQLEngine\Hooks\:
        resource: '../src/Hooks/*'

    GatoGraphQL\GatoGraphQLEngine\FeedbackItemProviders\:
        resource: '../src/FeedbackItemProviders/*'
