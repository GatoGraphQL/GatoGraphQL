    GatoGraphQL\GatoGraphQLEngine\ContentProcessors\MarkdownContentParserInterface:
        class: \GatoGraphQL\GatoGraphQLEngine\ContentProcessors\MarkdownContentParser

    GatoGraphQL\GatoGraphQLEngine\Registries\SchemaConfigBlockRegistryInterface:
        class: \GatoGraphQL\GatoGraphQLEngine\Registries\SchemaConfigBlockRegistry

    GatoGraphQL\GatoGraphQLEngine\Registries\EndpointBlockRegistryInterface:
        class: \GatoGraphQL\GatoGraphQLEngine\Registries\EndpointBlockRegistry

    GatoGraphQL\GatoGraphQLEngine\Registries\ModuleTypeRegistryInterface:
        class: \GatoGraphQL\GatoGraphQLEngine\Registries\ModuleTypeRegistry

    GatoGraphQL\GatoGraphQLEngine\Registries\EndpointSchemaConfigurationExecuterRegistryInterface:
        class: \GatoGraphQL\GatoGraphQLEngine\Registries\EndpointSchemaConfigurationExecuterRegistry

    GatoGraphQL\GatoGraphQLEngine\Registries\EndpointExecuterRegistryInterface:
        class: \GatoGraphQL\GatoGraphQLEngine\Registries\EndpointExecuterRegistry

    GatoGraphQL\GatoGraphQLEngine\Log\LoggerInterface:
